<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Authentication</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
      }
      
      #root {
        width: 100%;
        max-width: 400px;
      }
      
      .container {
        background: white;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
      }
      
      h1 {
        color: #333;
        margin-bottom: 1.5rem;
        text-align: center;
        font-size: 1.8rem;
      }
      
      h2 {
        color: #333;
        margin-bottom: 1rem;
        text-align: center;
      }
      
      .form-group {
        margin-bottom: 1rem;
      }
      
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #555;
        font-weight: 500;
        font-size: 0.9rem;
      }
      
      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }
      
      input:focus {
        outline: none;
        border-color: #667eea;
      }
      
      button {
        width: 100%;
        padding: 0.75rem;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 0.5rem;
      }
      
      button:hover {
        background: #5a67d8;
      }
      
      .toggle {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #666;
      }
      
      .toggle button {
        background: none;
        border: none;
        color: #667eea;
        cursor: pointer;
        text-decoration: underline;
        width: auto;
        padding: 0;
        margin: 0;
        font-size: 0.9rem;
      }
      
      .message {
        padding: 0.75rem;
        margin-bottom: 1rem;
        border-radius: 5px;
        text-align: center;
        font-size: 0.9rem;
      }
      
      .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      
      .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      
      .user-info {
        margin: 1rem 0;
      }
      
      .user-info p {
        margin: 0.5rem 0;
        color: #555;
        font-size: 0.95rem;
      }
      
      .user-info strong {
        color: #333;
      }
      
      .loading {
        text-align: center;
        color: #666;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
